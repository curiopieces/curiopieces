<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aquarius | Curio Pieces</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f3ed;
      color: #2b2b2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 20px 64px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 34rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #5f574f;
    }

    .widget-card {
      margin: 0 auto 24px;
      max-width: 520px;
      background: #fffdf9;
      border: 1px solid #ddd3c7;
      border-radius: 16px;
      padding: 20px 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      text-align: left;
    }

    .footer {
      margin-top: 34px;
      font-size: 0.92rem;
      color: #7a7267;
      text-align: center;
    }

    @media (max-width: 600px) {
      .container {
        padding: 44px 16px 52px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .subtitle {
        font-size: 1rem;
        margin-bottom: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Aquarius</h1>
    <p class="subtitle">A small moment of reflection.</p>

    <section class="widget-card">
      <script src="https://vedika.io/widget.js"
              data-sign="aquarius"
              data-theme="purple"></script>
    </section>

    <div class="footer">
      Curio Pieces
    </div>
  </main>
</body>
</html>
