<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blue Jay | Curio Pieces</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Libre+Baskerville:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f3ed;
      color: #2b2b2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 20px 64px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Libre Baskerville", Georgia, serif;
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 34rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #5f574f;
    }

    .player-card {
      margin: 0 auto 24px;
      max-width: 420px;
      background: #fffdf9;
      border: 1px solid #ddd3c7;
      border-radius: 16px;
      padding: 20px 14px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .player-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
    }

    .player-wrap iframe {
      width: 100%;
      max-width: 340px;
      height: 115px;
      border: 0;
      display: block;
      margin: 0 auto;
    }

    .credit {
      margin-top: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #6a6258;
    }

    .credit a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #b8aea1;
      padding-bottom: 1px;
    }

    .credit a:hover {
      border-bottom-color: #2b2b2b;
    }

    .footer {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

.footer {
  margin-top: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: "Inter", sans-serif;
  font-weight: 500;
  font-size: 20px;
  letter-spacing: 0.02em;
}

.brand img {
  width: 28px;
  height: auto;
  display: block;
}

.copyright {
  font-size: 12px;
  color: #a59f96;
  font-family: "Inter", sans-serif;
  font-weight: 500;
}
    @media (max-width: 600px) {
      .container {
        padding: 44px 16px 52px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .subtitle {
        font-size: 1rem;
        margin-bottom: 22px;
      }

      .player-card {
        padding: 16px 10px;
      }

      .player-wrap iframe {
        height: 115px;
      }

      .footer img {
        width: 180px;
      }
      .brand {
      font-size: 18px;
      }

      .brand img {
      width: 24px;
      }

      .copyright {
      font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Blue Jay</h1>
    <p class="subtitle">Tap below to hear its call.</p>

    <section class="player-card">
      <div class="player-wrap">
        <iframe
          src="https://xeno-canto.org/109601/embed?simple=1"
          scrolling="no"
          frameborder="0"
          width="340"
          height="115"
          title="Blue Jay recording">
        </iframe>
      </div>

      <div class="credit">
        Recording via Xeno-canto.
      </div>
    </section>

<div class="footer">
  <div class="brand">
    <span>Curio</span>
    <img src="/assets/logo.png" alt="spark logo">
    <span>Pieces</span>
  </div>

  <div class="copyright">
    © 2026 Curio Pieces. All rights reserved.
  </div>
</div>
  </main>
</body>
</html>
