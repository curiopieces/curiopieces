<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Black-capped Chickadee | Curio Pieces</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f3ed;
      color: #2b2b2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 20px 64px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 34rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #5f574f;
    }

    .player-card {
      margin: 0 auto 24px;
      max-width: 420px;
      background: #fffdf9;
      border: 1px solid #ddd3c7;
      border-radius: 16px;
      padding: 20px 14px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .player-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
    }

    .player-wrap iframe {
      width: 100%;
      max-width: 340px;
      height: 115px;
      border: 0;
      display: block;
      margin: 0 auto;
    }

    .credit {
      margin-top: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #6a6258;
    }

    .footer {
      margin-top: 34px;
      font-size: 0.92rem;
      color: #7a7267;
    }

    .credit a,
    .footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #b8aea1;
      padding-bottom: 1px;
    }

    .credit a:hover,
    .footer a:hover {
      border-bottom-color: #2b2b2b;
    }

    @media (max-width: 600px) {
      .container {
        padding: 44px 16px 52px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .subtitle {
        font-size: 1rem;
        margin-bottom: 22px;
      }

      .player-card {
        padding: 16px 10px;
      }

      .player-wrap iframe {
        height: 115px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Black-capped Chickadee</h1>
    <p class="subtitle">Tap below to hear its call.</p>

    <section class="player-card">
      <div class="player-wrap">
        <iframe
          src="https://xeno-canto.org/70185/embed?simple=1"
          scrolling="no"
          frameborder="0"
          width="340"
          height="115"
          title="Black-capped Chickadee recording">
        </iframe>
      </div>

      <div class="credit">
        Recording by Jonathon Jongsma via Xeno-canto.
      </div>
    </section>

    <div class="footer">
      Curio Pieces
    </div>
  </main>
</body>
</html>
