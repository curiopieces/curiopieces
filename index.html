<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curio Pieces</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f7f3ed;
      color: #2b2b2b;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      margin: 0 auto 18px;
      max-width: 560px;
    }

    .subtle {
      font-size: 15px;
      color: #6a6258;
      margin-top: 36px;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #b8aea1;
      padding-bottom: 2px;
    }

    a:hover {
      border-bottom-color: #2b2b2b;
    }

    @media (max-width: 600px) {
      .container {
        padding: 56px 20px;
      }

      h1 {
        font-size: 34px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Curio Pieces</h1>
    <p>Wooden postcards that connect you to the living world.</p>
    <p class="subtle">Launching soon.</p>
  </div>
</body>
</html>
