<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curio Pieces</title>

  <!-- Inter Medium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f3ed;
      color: #2b2b2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    .brand {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: 42px;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    .brand img {
      width: 36px;
      height: auto;
      display: block;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      margin: 0 auto 18px;
      max-width: 560px;
    }

    .subtle {
      font-size: 15px;
      color: #6a6258;
      margin-top: 36px;
    }

    .copyright {
      margin-top: 48px;
      font-size: 12px;
      color: #a59f96;
      font-family: "Inter", sans-serif;
      font-weight: 500;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #b8aea1;
      padding-bottom: 2px;
    }

    a:hover {
      border-bottom-color: #2b2b2b;
    }

    @media (max-width: 600px) {
      .container {
        padding: 56px 20px;
      }

      .brand {
        font-size: 34px;
        gap: 10px;
      }

      .brand img {
        width: 28px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="brand">
      <span>Curio</span>
      <img src="/assets/logo.png" alt="Curio Pieces spark logo">
      <span>Pieces</span>
    </div>

    <p>Thoughtful gifts for curious minds.</p>
    <p class="subtle">Launching soon.</p>

    <div class="copyright">
      © 2026 Curio Pieces. All rights reserved.
    </div>

  </div>
</body>
</html>
