<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moon Phase | Curio Pieces</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Libre+Baskerville:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f3ed;
      color: #2b2b2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 20px 64px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Libre Baskerville", Georgia, serif;
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 34rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #5f574f;
    }

    .module-card {
      margin: 0 auto 24px;
      max-width: 420px;
      background: #fffdf9;
      border: 1px solid #ddd3c7;
      border-radius: 16px;
      padding: 24px 14px 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .moon-module {
      display: flex;
      justify-content: center;
    }

    .credit {
      margin-top: 22px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #6a6258;
    }

    .credit a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #b8aea1;
      padding-bottom: 1px;
    }

    .credit a:hover {
      border-bottom-color: #2b2b2b;
    }

    .footer {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    .brand img {
      width: 28px;
      height: auto;
      display: block;
    }

    .copyright {
      font-size: 12px;
      color: #a59f96;
      font-family: "Inter", sans-serif;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .container {
        padding: 44px 16px 52px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .subtitle {
        font-size: 1rem;
        margin-bottom: 22px;
      }

      .module-card {
        padding: 20px 10px 18px;
      }

      .brand {
        font-size: 18px;
      }

      .brand img {
        width: 24px;
      }

      .copyright {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Moon Phase</h1>
    <p class="subtitle">See the moon as it is tonight.</p>

    <section class="module-card">
      <div class="moon-module">
        <!-- Begin Current Moon Phase HTML (c) MoonConnection.com -->
        <table cellpadding="0" cellspacing="0" border="0" width="128">
          <tr>
            <td align="center">
              <a href="https://www.moonconnection.com" target="_blank" rel="noopener noreferrer">
                <img src="https://www.moonmodule.com/cs/dm/vn.gif" width="128" height="196" border="0" alt="Current moon phase" />
              </a>
              <div style="position:relative;width:128px;margin:0 auto;">
                <div style="position:absolute;top:-20px;left:6px;background:#000000;width:116px;text-align:center;">
                  <a href="https://www.moonconnection.com/" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">
                    <span style="color:#7F7F7F;font-family:arial,helvetica,sans-serif;font-size:10px;">moon info</span>
                  </a>
                </div>
              </div>
            </td>
          </tr>
        </table>
        <!-- end moon phase HTML -->
      </div>

      <div class="credit">
        Moon phase module via <a href="https://www.moonconnection.com/" target="_blank" rel="noopener noreferrer">MoonConnection</a>.
      </div>
    </section>

    <div class="footer">
      <div class="brand">
        <span>Curio</span>
        <img src="/assets/logo.png" alt="Curio Pieces spark logo">
        <span>Pieces</span>
      </div>

      <div class="copyright">
        © 2026 Curio Pieces. All rights reserved.
      </div>
    </div>
  </main>
</body>
</html>
