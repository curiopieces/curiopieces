<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moon Phase | Curio Pieces</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Libre+Baskerville:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f3ed;
      color: #2b2b2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 20px 64px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Libre Baskerville", Georgia, serif;
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 34rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #5f574f;
    }

    .module-card {
      margin: 0 auto 24px;
      max-width: 480px;
      background: #fffdf9;
      border: 1px solid #ddd3c7;
      border-radius: 16px;
      padding: 28px 18px 22px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .moon-visual {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
      min-height: 250px;
    }

    .moon-svg {
      width: 270px;
      max-width: 78vw;
      height: auto;
      display: block;
    }

    .phase-name {
      font-family: "Libre Baskerville", Georgia, serif;
      font-size: 1.35rem;
      line-height: 1.3;
      margin: 0 0 8px;
      color: #2b2b2b;
    }

    .phase-detail {
      font-size: 0.98rem;
      line-height: 1.6;
      color: #6a6258;
      margin: 0;
    }

    .footer {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    .brand img {
      width: 28px;
      height: auto;
      display: block;
    }

    .copyright {
      font-size: 12px;
      color: #a59f96;
      font-family: "Inter", sans-serif;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .container {
        padding: 44px 16px 52px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .subtitle {
        font-size: 1rem;
        margin-bottom: 22px;
      }

      .module-card {
        max-width: 100%;
        padding: 24px 14px 18px;
      }

      .moon-svg {
        width: 230px;
      }

      .phase-name {
        font-size: 1.2rem;
      }

      .brand {
        font-size: 18px;
      }

      .brand img {
        width: 24px;
      }

      .copyright {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Moon Phase</h1>
    <p class="subtitle">See the moon as it is tonight.</p>

    <section class="module-card">
      <div class="moon-visual" id="moon-visual"></div>
      <p class="phase-name" id="phase-name">Loading moon phase…</p>
      <p class="phase-detail" id="phase-detail"></p>
    </section>

    <div class="footer">
      <div class="brand">
        <span>Curio</span>
        <img src="/assets/logo.png" alt="Curio Pieces spark logo">
        <span>Pieces</span>
      </div>

      <div class="copyright">
        © 2026 Curio Pieces. All rights reserved.
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      try {
        const visualEl = document.getElementById("moon-visual");
        const nameEl = document.getElementById("phase-name");
        const detailEl = document.getElementById("phase-detail");

        if (!visualEl || !nameEl || !detailEl) {
          throw new Error("Moon page elements not found.");
        }

        function getMoonData(date) {
          const synodicMonth = 29.530588853;
          const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14, 0);

          const nowUTC = Date.UTC(
            date.getUTCFullYear(),
            date.getUTCMonth(),
            date.getUTCDate(),
            date.getUTCHours(),
            date.getUTCMinutes(),
            date.getUTCSeconds()
          );

          const daysSince = (nowUTC - knownNewMoon) / 86400000;
          const age = ((daysSince % synodicMonth) + synodicMonth) % synodicMonth;
          const illumination = 0.5 * (1 - Math.cos((2 * Math.PI * age) / synodicMonth));

          let phaseName = "";
          if (age < 1.84566) phaseName = "New Moon";
          else if (age < 5.53699) phaseName = "Waxing Crescent";
          else if (age < 9.22831) phaseName = "First Quarter";
          else if (age < 12.91963) phaseName = "Waxing Gibbous";
          else if (age < 16.61096) phaseName = "Full Moon";
          else if (age < 20.30228) phaseName = "Waning Gibbous";
          else if (age < 23.99361) phaseName = "Last Quarter";
          else if (age < 27.68493) phaseName = "Waning Crescent";
          else phaseName = "New Moon";

          const waxing = age < synodicMonth / 2;

          return {
            age: age,
            illumination: illumination,
            phaseName: phaseName,
            waxing: waxing
          };
        }

        function realisticMoonSVG(illumination, waxing) {
          const size = 320;
          const cx = size / 2;
          const cy = size / 2;
          const r = 118;
          const k = 2 * illumination - 1;
          const innerRx = Math.max(2, Math.abs(k) * r);
          const sweepOuter = waxing ? 1 : 0;
          const sweepInner = waxing ? 0 : 1;

          const litPath =
            "M " + cx + " " + (cy - r) +
            " A " + r + " " + r + " 0 0 " + sweepOuter + " " + cx + " " + (cy + r) +
            " A " + innerRx + " " + r + " 0 0 " + sweepInner + " " + cx + " " + (cy - r) +
            " Z";

          return `
            <svg class="moon-svg" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Current moon phase">
              <defs>
                <radialGradient id="moonBase" cx="42%" cy="38%" r="65%">
                  <stop offset="0%" stop-color="#f4f1ea"/>
                  <stop offset="55%" stop-color="#e6e0d4"/>
                  <stop offset="100%" stop-color="#cfc6ba"/>
                </radialGradient>

                <radialGradient id="shadowGrad" cx="50%" cy="50%" r="60%">
                  <stop offset="0%" stop-color="#1f1f1f"/>
                  <stop offset="100%" stop-color="#111111"/>
                </radialGradient>

                <filter id="moonShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.14"/>
                </filter>

                <clipPath id="moonClip">
                  <circle cx="${cx}" cy="${cy}" r="${r}" />
                </clipPath>

                <mask id="litMask">
                  <rect width="100%" height="100%" fill="black"/>
                  <path d="${litPath}" fill="white"/>
                </mask>
              </defs>

              <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#shadowGrad)" filter="url(#moonShadow)"/>

              <g mask="url(#litMask)">
                <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#moonBase)"/>

                <g clip-path="url(#moonClip)" opacity="0.22">
                  <ellipse cx="${cx - 30}" cy="${cy - 18}" rx="28" ry="18" fill="#9f9689"/>
                  <ellipse cx="${cx + 18}" cy="${cy - 38}" rx="22" ry="14" fill="#a79d90"/>
                  <ellipse cx="${cx + 34}" cy="${cy + 10}" rx="18" ry="12" fill="#a79d90"/>
                  <ellipse cx="${cx - 8}" cy="${cy + 34}" rx="26" ry="16" fill="#9f9689"/>
                  <ellipse cx="${cx - 44}" cy="${cy + 26}" rx="16" ry="10" fill="#aaa092"/>
                </g>

                <g clip-path="url(#moonClip)" opacity="0.35">
                  <circle cx="${cx - 52}" cy="${cy - 46}" r="8" fill="none" stroke="#b8aea1" stroke-width="2"/>
                  <circle cx="${cx + 40}" cy="${cy - 20}" r="10" fill="none" stroke="#b8aea1" stroke-width="2"/>
                  <circle cx="${cx - 18}" cy="${cy + 12}" r="6" fill="none" stroke="#b8aea1" stroke-width="1.5"/>
                  <circle cx="${cx + 2}" cy="${cy + 48}" r="7" fill="none" stroke="#b8aea1" stroke-width="1.8"/>
                  <circle cx="${cx - 36}" cy="${cy + 38}" r="5" fill="none" stroke="#b8aea1" stroke-width="1.4"/>
                  <circle cx="${cx + 52}" cy="${cy + 36}" r="6" fill="none" stroke="#b8aea1" stroke-width="1.5"/>
                </g>
              </g>

              <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#c8beb2" stroke-width="1.5"/>
            </svg>
          `;
        }

        const moon = getMoonData(new Date());
        const pct = Math.round(moon.illumination * 100);

        visualEl.innerHTML = realisticMoonSVG(moon.illumination, moon.waxing);
        nameEl.textContent = moon.phaseName;
        detailEl.textContent = pct + "% illuminated";
      } catch (err) {
        console.error(err);
        const nameEl = document.getElementById("phase-name");
        const detailEl = document.getElementById("phase-detail");
        if (nameEl) nameEl.textContent = "Moon phase unavailable";
        if (detailEl) detailEl.textContent = "Please refresh and try again.";
      }
    });
  </script>
</body>
</html>
